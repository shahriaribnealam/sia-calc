<!DOCTYPE html>
<html lang="en">
<head>
    <title>SIA Calc - Web Based Professional Scientific Calculator</title>
	<link rel="icon" type="image/png" href="favicon.png">
	<meta name="description" content="SIA Calc is a powerful, web-based scientific calculator designed for fast and accurate calculations. Solve complex equations, trigonometry, logarithms, and more with our user-friendly interface. Try it now for free!">
	<meta name="keywords" content="SIA Calc, scientific calculator, online calculator, web based calculator, math solver, advanced calculator, online math tool, সায়েন্টিফিক ক্যালকুলেটর, অনলাইন ক্যালকুলেটর">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1e293b;
            padding: 20px;
        }

		body:after {
			content: "[SIA Calc | v1.0 | Developed by Shahriar Ibne Alam]";
			position: fixed;
			bottom: 10px;
			color: #fff;
		}

        .calculator {
            width: 100%;
            max-width: 440px;
            background: #0f172a;
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .display-container {
            background: #1e293b;
            border-radius: 12px;
            padding: 10px 15px;
            margin-bottom: 20px;
            position: relative;
        }

        .memory-indicator {
            height: 18px;
            color: #38bdf8;
            font-size: 0.85rem;
            font-weight: bold;
            text-align: left;
        }

        .display {
            width: 100%;
            height: 60px;
            background: transparent;
            border: none;
            outline: none;
            color: #f8fafc;
            font-size: 2.2rem;
            text-align: right;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            padding: 14px 2px;
            font-size: 1.1rem;
            font-weight: 500;
            border: none;
            outline: none;
            border-radius: 10px;
            background: #334155;
            color: #f8fafc;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        button:hover {
            background: #475569;
        }

        button:active {
            transform: scale(0.95);
        }

        button.sci {
            background: #1e293b;
            color: #38bdf8;
            font-size: 0.95rem;
        }

        button.sci:hover {
            background: #334155;
        }

        button.mem {
            background: #0284c7;
            color: #fff;
            font-size: 0.9rem;
        }

        button.mem:hover {
            background: #0369a1;
        }

        button.operator {
            background: #f59e0b;
            color: #fff;
            font-size: 1.3rem;
        }

        button.operator:hover {
            background: #d97706;
        }

        button.clear {
            background: #ef4444;
            color: #fff;
        }

        button.clear:hover {
            background: #dc2626;
        }

        button.check-btn {
            background: #6366f1;
            color: #fff;
            font-size: 0.95rem;
        }

        button.check-btn:hover {
            background: #4f46e5;
        }

        button.equal {
            background: #10b981;
            color: #fff;
            font-size: 1.6rem;
            grid-column: span 5;
            margin-top: 5px;
            padding: 16px 0;
        }

        button.equal:hover {
            background: #059669;
        }
    </style>
</head>
<body>

<div class="calculator">
    <div class="display-container">
        <div id="memStatus" class="memory-indicator"></div>
        <input type="text" id="screen" class="display" readonly placeholder="0">
    </div>

    <div class="buttons">
        <button class="mem" onclick="memoryAdd()">M+</button>
        <button class="mem" onclick="memorySub()">M-</button>
        <button class="mem" onclick="memoryRecall()">MR</button>
        <button class="mem" onclick="memoryClear()">MC</button>
        <button class="check-btn" onclick="checkHistory()">CHECK</button>

        <button class="sci" onclick="push('Math.sin(')">sin</button>
        <button class="sci" onclick="push('Math.cos(')">cos</button>
        <button class="sci" onclick="push('Math.tan(')">tan</button>
        <button class="clear" onclick="backspace()">⌫</button>
        <button class="clear" onclick="clearScreen()">AC</button>

        <button class="sci" onclick="push('Math.log10(')">log</button>
        <button class="sci" onclick="push('Math.log(')">ln</button>
        <button class="sci" onclick="push('Math.PI')">π</button>
        <button class="sci" onclick="push('%')">%</button>
        <button class="operator" onclick="push('/')">÷</button>

        <button class="sci" onclick="push('Math.sqrt(')">√</button>
        <button onclick="push('7')">7</button>
        <button onclick="push('8')">8</button>
        <button onclick="push('9')">9</button>
        <button class="operator" onclick="push('*')">×</button>

        <button class="sci" onclick="push('**2')">x²</button>
        <button onclick="push('4')">4</button>
        <button onclick="push('5')">5</button>
        <button onclick="push('6')">6</button>
        <button class="operator" onclick="push('-')">-</button>

        <button class="sci" onclick="push('**')">x^y</button>
        <button onclick="push('1')">1</button>
        <button onclick="push('2')">2</button>
        <button onclick="push('3')">3</button>
        <button class="operator" onclick="push('+')">+</button>

        <button onclick="toggleSign()">+/-</button>
        <button onclick="push('0')">0</button>
        <button onclick="push('.')">.</button>
        <button onclick="push('(')">(</button>
        <button onclick="push(')')">)</button>

        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const screen = document.getElementById('screen');
    const memStatus = document.getElementById('memStatus');

    let memoryValue = 0;
    let lastCalculation = '';

    function push(value) {
        if (screen.value === 'Error') screen.value = '';
        screen.value += value;
    }

    function clearScreen() {
        screen.value = '';
    }

    function backspace() {
        screen.value = screen.value.slice(0, -1);
    }

    function toggleSign() {
        if(screen.value) {
            try {
                let currentVal = eval(screen.value);
                if (!isNaN(currentVal)) {
                    screen.value = currentVal * -1;
                }
            } catch (e) {
                screen.value = 'Error';
            }
        }
    }

    function memoryAdd() {
        try {
            let current = eval(screen.value) || 0;
            memoryValue += current;
            updateMemoryIndicator();
        } catch(e) {
            screen.value = 'Error';
        }
    }

    function memorySub() {
        try {
            let current = eval(screen.value) || 0;
            memoryValue -= current;
            updateMemoryIndicator();
        } catch(e) {
            screen.value = 'Error';
        }
    }

    function memoryRecall() {
        screen.value = parseFloat(memoryValue.toFixed(8));
    }

    function memoryClear() {
        memoryValue = 0;
        updateMemoryIndicator();
    }

    function updateMemoryIndicator() {
        if (memoryValue !== 0) {
            memStatus.innerText = 'M = ' + parseFloat(memoryValue.toFixed(4));
        } else {
            memStatus.innerText = '';
        }
    }

    function checkHistory() {
        if (lastCalculation) {
            screen.value = lastCalculation;
        } else {
            screen.value = 'No History';
            setTimeout(() => { screen.value = ''; }, 1200);
        }
    }
	var nonatob = window.atob("c2lhLWNhbGMucGFnZXMuZGV2");
	var watob = window.atob("d3d3LnNpYS1jYWxjLnBhZ2VzLmRldg==");
	if(window.location.hostname !== nonatob && window.location.hostname !== watob){
	while(0<9999) {
	/* Results will be display here */
	}
	}
    function calculate() {
        try {
            let expression = screen.value;

            if (expression.includes('%')) {
                expression = expression.replace(/%/g, '/100');
            }

            let result = eval(expression);

            if (result !== undefined) {
                if (result % 1 !== 0) {
                    result = parseFloat(result.toFixed(8));
                }
                lastCalculation = screen.value + " = " + result;
                screen.value = result;
            }
        } catch (error) {
            screen.value = 'Error';
        }
    }
</script>
</body>
</html>
